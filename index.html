<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Star Netflix - 현재 상영작</title>
  <link rel="stylesheet" href="style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
</head>
<body>
  <header class="header">
    <div class="header__inner">
      <h1 class="logo">STAR<span>FLIX</span></h1>
      <nav class="nav">
        <a href="#" class="nav__link nav__link--active">현재 상영작</a>
      </nav>
    </div>
  </header>

  <main>
    <section class="hero">
      <div class="hero__overlay"></div>
      <div class="hero__content">
        <p class="hero__label">지금 극장에서</p>
        <h2 class="hero__title">현재 상영 중인 영화</h2>
        <p class="hero__desc">전 세계 극장에서 상영 중인 최신 영화를 만나보세요.</p>
      </div>
    </section>

    <section class="movies-section">
      <h3 class="section-title">Now Playing</h3>
      <div id="loading" class="loading">
        <div class="spinner"></div>
        <p>영화를 불러오는 중...</p>
      </div>
      <div id="error" class="error" hidden>
        <p id="error-message">영화 정보를 불러오지 못했습니다. 잠시 후 다시 시도해 주세요.</p>
      </div>
      <div id="movie-grid" class="movie-grid"></div>
    </section>
  </main>

  <footer class="footer">
    <p>&copy; 2026 StarFlix. Powered by TMDB API.</p>
  </footer>

  <script src="script.js"></script>
</body>
</html>
